<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <meta name="theme-color" content="#001529" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Guerreiros" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="favicon" href="/icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>Guerreiros de Oya e Ogun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body { 
        overscroll-behavior-y: contain; 
        background-color: #001529;
        margin: 0;
        padding: 0;
      }
      #splash-preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: #001529;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: opacity 0.8s ease-out;
      }
      #splash-preloader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .native-leaf {
        position: absolute;
        width: 20px;
        height: 20px;
        color: rgba(205, 127, 50, 0.2);
        fill: rgba(205, 127, 50, 0.05);
        pointer-events: none;
        will-change: transform;
        animation: leafFloatNative 15s linear infinite;
        bottom: -50px;
      }
      @keyframes leafFloatNative {
        0% { transform: translateY(0) rotate(0deg); opacity: 0; }
        20% { opacity: 0.3; }
        80% { opacity: 0.3; }
        100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
      }
      .preloader-logo-container {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .preloader-logo {
        width: 192px;
        height: 192px;
        background: white;
        border-radius: 50%;
        border: 2px solid rgba(205, 127, 50, 0.3);
        box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px;
        animation: pulseLogo 3s ease-in-out infinite;
      }
      @keyframes pulseLogo {
        0%, 100% { transform: scale(1); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        50% { transform: scale(1.05); box-shadow: 0 30px 60px rgba(205, 127, 50, 0.2); }
      }
      .preloader-title {
        color: #D4AF37;
        font-family: serif;
        font-size: 24px;
        letter-spacing: 0.5em;
        font-weight: 900;
        text-transform: uppercase;
        margin-top: 40px;
        text-align: center;
      }
      .preloader-bar-bg {
        width: 192px;
        height: 2px;
        background: rgba(205, 127, 50, 0.2);
        margin-top: 24px;
        border-radius: 1px;
        overflow: hidden;
      }
      .preloader-bar-fill {
        height: 100%;
        background: #D4AF37;
        width: 0%;
        animation: fillBar 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes fillBar {
        to { width: 100%; }
      }
    </style>
  </head>
  <body class="bg-[#001529]">
    <div id="splash-preloader">
      <div class="preloader-logo-container">
        <div class="preloader-logo">
          <img src="/icon.svg" width="100%" height="100%" alt="Logo" />
        </div>
        <div class="preloader-title">GUERREIROS DE OYA E OGUN</div>
        <div class="preloader-bar-bg">
          <div class="preloader-bar-fill"></div>
        </div>
      </div>
      <!-- Leaves -->
      <script>
        const container = document.getElementById('splash-preloader');
        for (let i = 0; i < 20; i++) {
          const leaf = document.createElement('div');
          leaf.className = 'native-leaf';
          leaf.innerHTML = '<svg viewBox="0 0 24 24"><path d="M21 21L12 12M12 12C12 12 7 13 4 10C1 7 2 2 2 2C2 2 7 1 10 4C13 7 12 12 12 12Z"/></svg>';
          leaf.style.left = Math.random() * 100 + '%';
          leaf.style.animationDuration = (10 + Math.random() * 10) + 's';
          leaf.style.animationDelay = (Math.random() * -15) + 's';
          leaf.style.width = leaf.style.height = (15 + Math.random() * 20) + 'px';
          container.appendChild(leaf);
        }
      </script>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
