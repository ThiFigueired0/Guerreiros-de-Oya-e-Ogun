<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <meta name="theme-color" content="#001529" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Guerreiros" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="favicon" href="/icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>Guerreiros de Oya e Ogun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-brand-navy: #001529;
        --color-brand-copper: #CD7F32;
        --color-brand-gold: #D4AF37;
      }
      body, html { 
        overscroll-behavior-y: contain; 
        background-color: var(--color-brand-navy);
        margin: 0;
        padding: 0;
        font-family: 'Montserrat', sans-serif !important;
        color: white;
        height: 100%;
        overflow-x: hidden;
      }
      /* Critical Layout Classes */
      .bg-brand-navy { background-color: var(--color-brand-navy); }
      .text-brand-gold { color: var(--color-brand-gold); }
      .text-brand-copper { color: var(--color-brand-copper); }
      .bg-\[\#001529\] { background-color: var(--color-brand-navy) !important; }
      
      * { font-family: 'Montserrat', sans-serif !important; }
      h1, h2, .font-serif, [class*='Playfair'], .title-text { font-family: 'Playfair Display', serif !important; letter-spacing: 0.1em; }
      body, p, span, button, .font-sans { font-family: 'Montserrat', sans-serif !important; }
      
      #splash-preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: var(--color-brand-navy);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.8s ease-out;
      }
      #splash-preloader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .preloader-logo-container {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .preloader-logo {
        width: 120px;
        height: 120px;
        background: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px;
        border: 2px solid var(--color-brand-gold);
      }
      .preloader-title {
        color: var(--color-brand-gold);
        font-size: 18px;
        letter-spacing: 0.2em;
        font-weight: 700;
        text-transform: uppercase;
        margin-top: 20px;
        text-align: center;
      }
      .preloader-bar-bg {
        width: 120px;
        height: 2px;
        background: rgba(205, 127, 50, 0.2);
        margin-top: 20px;
        border-radius: 1px;
        overflow: hidden;
      }
      .preloader-bar-fill {
        height: 100%;
        background: var(--color-brand-gold);
        width: 0%;
        animation: fillBar 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes fillBar { to { width: 100%; } }
      
      /* Essential Custom Global Styles */
      .perspective-1000 { perspective: 1000px; }
      .preserve-3d { transform-style: preserve-3d; }
      .backface-hidden { backface-visibility: hidden; }
      ::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body class="bg-[#001529]">
    <div id="splash-preloader">
      <div class="preloader-logo-container">
        <div class="preloader-logo">
          <img src="/icon.svg" width="100%" height="100%" alt="Logo" />
        </div>
        <div class="preloader-title">GUERREIROS DE OYA E OGUN</div>
        <div class="preloader-bar-bg">
          <div class="preloader-bar-fill"></div>
        </div>
      </div>
      <!-- Leaves -->
      <script>
        const container = document.getElementById('splash-preloader');
        for (let i = 0; i < 20; i++) {
          const leaf = document.createElement('div');
          leaf.className = 'native-leaf';
          leaf.innerHTML = '<svg viewBox="0 0 24 24"><path d="M21 21L12 12M12 12C12 12 7 13 4 10C1 7 2 2 2 2C2 2 7 1 10 4C13 7 12 12 12 12Z"/></svg>';
          leaf.style.left = Math.random() * 100 + '%';
          leaf.style.animationDuration = (10 + Math.random() * 10) + 's';
          leaf.style.animationDelay = (Math.random() * -15) + 's';
          leaf.style.width = leaf.style.height = (15 + Math.random() * 20) + 'px';
          container.appendChild(leaf);
        }
        
        // Safety fallback to ensure the preloader disappears even if React fails to load
        setTimeout(() => {
          if (container && !container.classList.contains('fade-out')) {
            container.classList.add('fade-out');
            setTimeout(() => { container.remove(); }, 850);
          }
        }, 5000);
      </script>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
